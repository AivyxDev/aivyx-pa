name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: .zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: .tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout aivyx-pa
        uses: actions/checkout@v4
        with:
          path: aivyx-pa

      - name: Checkout aivyx-core
        uses: actions/checkout@v4
        with:
          repository: AivyxDev/aivyx-core
          path: aivyx-core
          token: ${{ secrets.AIVYX_CI_PAT }}

      - name: Checkout aivyx-factory
        uses: actions/checkout@v4
        with:
          repository: AivyxDev/aivyx-factory
          path: aivyx-factory
          token: ${{ secrets.AIVYX_CI_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: aivyx-pa

      - name: Build Binary
        working-directory: aivyx-pa
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Release (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: aivyx-pa
        run: |
          tar -czf aivyx-pa-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }} -C target/${{ matrix.target }}/release aivyx-pa
          mkdir -p artifacts
          mv aivyx-pa-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }} artifacts/

      - name: Package Release (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: aivyx-pa
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Compress-Archive -Path target\${{ matrix.target }}\release\aivyx-pa.exe -DestinationPath artifacts\aivyx-pa-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivyx-pa-${{ github.ref_name }}-${{ matrix.target }}
          path: aivyx-pa/artifacts/*

  publish-release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout aivyx-pa
        uses: actions/checkout@v4
        with:
          path: aivyx-pa
          
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
